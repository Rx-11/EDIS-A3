apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  
  labels:
    app: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
      - name: customer-service
        image: 813170851015.dkr.ecr.us-east-1.amazonaws.com/customer-service:latest
        env:
        - name: DB_USER
          value: "user"
        - name: DB_PASSWORD
          value: "password"
        - name: DB_HOST
          value: "bookstore-db-dev.cluster-cndk3sokkeyc.us-east-1.rds.amazonaws.com"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "bookstoredb"
        - name: DB_MIGRATE
          value: "true"
        - name: KAFKA_BROKERS
          value: "98.88.99.206:9092,34.195.107.7:9092,54.221.160.63:9092"
        - name: KAFKA_TOPIC
          value: "vkannawa.customer.evt"
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 10
