apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-mobile-bff
  
  labels:
    app: book-mobile-bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-mobile-bff
  template:
    metadata:
      labels:
        app: book-mobile-bff
    spec:
      containers:
      - name: book-mobile-bff
        image: 813170851015.dkr.ecr.us-east-1.amazonaws.com/book-mobile-bff:latest # Replace with your image repository and tag
        imagePullPolicy: Always
        env:
        - name: CUSTOMER_SVC_URL
          value: "http://customer-service:8080"
        - name: BOOK_SVC_URL
          value: "http://book-service:8080"
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
