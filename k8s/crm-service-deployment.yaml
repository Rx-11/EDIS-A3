apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  
  labels:
    app: crm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      containers:
      - name: crm-service
        image: 813170851015.dkr.ecr.us-east-1.amazonaws.com/crm-service:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKER
          value: "98.88.99.206:9092,34.195.107.7:9092,54.221.160.63:9092"
        - name: KAFKA_TOPIC
          value: "vkannawa.customer.evt"
        - name: SMTP_EMAIL
          value: "<your-email>@gmail.com"
        - name: SMTP_PASSWORD
          value: "<your-app-password>"
        ports:
        - containerPort: 8080
